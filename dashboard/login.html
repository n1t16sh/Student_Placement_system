<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Company Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298,#00c6ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:12px;
backdrop-filter:blur(8px);
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:20px;
outline:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:20px;
background:#00c6ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0096c7;
}

a{
color:#fff;
text-decoration:none;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Company Login</h2>

<input type="email" id="email" placeholder="Enter Company Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p style="margin-top:15px;">
Don't have an account? 
<a href="company-register.html">Register</a>
</p>

<p>
<a href="index.html">← Back to Home</a>
</p>

</div>

<script>

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "" || password === ""){
alert("Please fill all fields");
return;
}

fetch("http://127.0.0.1:5000/company/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
email: email,
password: password
})
})
.then(response => response.json())
.then(data => {

alert(data.message);

/* ✅ CHANGE HERE */

if(data.message === "Login successful"){
window.location.href = "company-dashboard.html";
}

})
.catch(error => {
alert("Server error");
});

}

</script>

</body>
</html>
